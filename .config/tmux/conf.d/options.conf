# general UX
# set -g default-terminal 'xterm-256color'

# set RGB (truecolor) - tmux 3.2+
set -as terminal-features ",xterm*:RGB"
set -as terminal-features ',alacritty:RGB'

# Truecolor passthrough for generic external terminal for older versions of tmux
set -sa terminal-overrides ',xterm-256color:Tc'

# tmux-sensible carryovers (explicit)
# Ref: https://github.com/tmux-plugins/tmux-sensible
set -s escape-time 10
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -s focus-events on
set -g status-keys emacs
# Legacy macOS workaround for old tmux (<2.6); keep commented.
# set -g default-command "reattach-to-user-namespace -l $SHELL"

# switch to another session when current session is destroyed
set-option -g detach-on-destroy off

# key responsiveness / repeats
set -sg repeat-time 600
setw -g mode-keys vi

# tmux-resurrect storage and pane capture
run-shell -b 'DATA="${XDG_DATA_HOME:-$HOME/.local/share}"; mkdir -p "$DATA/tmux/plugins" "$DATA/tmux/resurrect"; [ -e "$DATA/tmux/plugins/tpm_log.txt" ] || touch "$DATA/tmux/plugins/tpm_log.txt"'
set -g @resurrect-dir "$HOME/.local/share/tmux/resurrect"
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# indexing
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on

# mouse (default on; toggle via prefix + m)
set -g mouse on

# titles
set -g set-titles on
set -g set-titles-string "#{?pane_in_mode,copy-mode,#{pane_current_command}} · #S ● #I:#W"

# clipboard (>=3.2)
set -g set-clipboard on
