# Prefix key
unbind C-b
unbind C-a
set -gu prefix2
set -g prefix C-Space
bind C-Space send-prefix

# Disable stock aliases we don't use
unbind n
unbind +
unbind q

# Config helpers
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "tmux config reloaded"
bind e new-window -n "tmux.conf" "sh -c '\${EDITOR:-vim} $HOME/.config/tmux/tmux.conf'"
bind ? run-shell "tmux list-keys | less"

# Session/window helpers
bind C-c new-session
bind C-f command-prompt -p "find-session" "switch-client -t '%%'"
bind Tab last-window
bind BTab switch-client -l
bind p display-panes

# Split panes
bind - split-window -v
bind | split-window -h

# Pane movement and resize
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 4
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 4
bind > swap-pane -D
bind < swap-pane -U

# Window movement
bind -r C-h previous-window
bind -r C-l next-window
bind -r \{ swap-window -t -1 \; select-window -t -1
bind -r \} swap-window -t +1 \; select-window -t +1

# Pane marks and mouse
bind M set -g mouse \; display-message "mouse: #{?mouse,on,off}"
bind m select-pane -m \; display-message "marked pane #{pane_index}"
bind "'" select-pane -t :.-

# Copy mode (vi)
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi MouseUp1Pane select-pane \; send-keys -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane select-pane \; send-keys -X stop-selection
# Copy-mode left-click cancel intentionally takes precedence over MouseUp for
# double/triple click selection, so keep those disabled here.
# bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
# bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-selection-and-cancel \; paste-buffer
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
