# Copy-mode styling: centered peach mode badge plus time/scroll pills.
set -g copy-mode-position-format "#[align=centre]#[fg=#{@thm_peach}]#[fg=#{@thm_crust},bg=#{@thm_peach},bold] 󰆐 COPY MODE #[fg=#{@thm_peach},bg=default]#[default]#{?#{e|>:#{top_line_time},0},  #[fg=#{@thm_peach}]#[fg=#{@thm_crust}#,bg=#{@thm_peach}]󰃰 #[fg=#{@thm_peach}#,bg=#{@thm_surface_0}] #{t/p:top_line_time} #[fg=#{@thm_surface_0}#,bg=default]#[default],}  #[fg=#{@thm_peach}]#[fg=#{@thm_crust},bg=#{@thm_peach}]↕ #[fg=#{@thm_peach},bg=#{@thm_surface_0}] #{scroll_position}/#{history_size} #[fg=#{@thm_surface_0},bg=default]#[default]"
set -g copy-mode-position-style "fg=#{@thm_text},bg=default"
set -g pane-active-border-style "#{?pane_in_mode,fg=#{@thm_peach},#{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
