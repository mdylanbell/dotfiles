# Loaded when MISE_ENV=work is set
[tools]
terraform = "latest"
helm = "latest"
python = "3.11"
"pipx:poetry" = "latest"
node = { version = "22" }

[tasks."update:for_env"]
description = "Update tools for environment: work"
run = ["claude update"]

[tasks."install:terminal:for_env"]
description = "Install the work terminal Brewfile"
run = '''
brewfile="$DOTFILES_ROOT/brewfiles/terminal.env.work"
if [ -f "$brewfile" ]; then
  echo "Installing Homebrew bundle from $brewfile"
  brew bundle --file="$brewfile"
fi
'''

[tasks."install:gui:for_env"]
description = "Install the work GUI Brewfile"
run = '''
brewfile="$DOTFILES_ROOT/brewfiles/gui.env.work"
if [ -f "$brewfile" ]; then
  echo "Installing Homebrew bundle from $brewfile"
  brew bundle --file="$brewfile"
fi
'''
