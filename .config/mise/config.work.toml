# Loaded when MISE_ENV=work is set
[tools]
# terraform = "latest"
# helm = "latest"
# "pipx:poetry" = "latest"
# node = { version = "22" }

[settings]
disable_tools = ["1password-cli"]

[tasks."update:for_env"]
description = "Update tools for environment: work"
run = ["claude update"]

[tasks."install:terminal:for_env"]
description = "Install the work terminal Brewfile"
extends = "brewfile:bundle_install"
vars = { brewfile = "terminal.env.work" }

[tasks."install:gui:for_env"]
description = "Install the work GUI Brewfile"
extends = "brewfile:bundle_install"
vars = { brewfile = "gui.env.work" }

# secrets:render is currently a no-op for work
[tasks."secrets:render"]
description = "Render secrets for environment: work (not currently supported)"
run = "true"
