[tasks."clean"]
description = "Clean up old packages and caches"
run = { tasks = ["clean:brew", "clean:mise", "clean:zinit", "clean:dfm"] }

[tasks."clean:brew"]
description = "Cleanup Homebrew cache and old versions"
run = ["brew cleanup -s"]

[tasks."clean:mise"]
description = "Mise prune"
run = ["mise prune"]

[tasks."clean:zinit"]
description = "Clean zinit cache"
quiet = true
run = '''
#!/usr/bin/env zsh
# Source zinit explicitly so the function exists in this non-interactive shell
ZINIT_HOME="${ZINIT_HOME:-$HOME/.local/share/zinit}"
source "$ZINIT_HOME/zinit.git/zinit.zsh"

# zinit delete --clean
zinit cclear
'''

[tasks."clean:dfm"]
description = "Clean dfm created .backup folders"
run = ["fd -H '^.backup$' --type dir ~ -X rmdir {}"]
