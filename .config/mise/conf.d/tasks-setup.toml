# -------------------------
# Tasks :: setup
# -------------------------

[tasks.setup]
description = "Perform initial setup; should be one-time things"
run = ["bat cache --build", "mise reshim"]

# gh (GitHub cli) :: can't run in main setup since we need to auth to github (gh auth login)
[tasks.setup_gh]
description = "Install gh extensions"
run = [
  "gh extension install dlvhdr/gh-dash",
  "gh extension install eikster-dk/gh-worktree",
]
