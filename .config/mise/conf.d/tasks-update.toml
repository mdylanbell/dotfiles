[vars]
antidote_home = "{{ xdg_data_home }}/antidote"
zsh_plugin_list_file = "{{ config_root }}/.config/zsh/.zsh_plugins.txt"
zsh_plugin_static_file = "{{ xdg_cache_home }}/zsh/antidote/.zsh_plugins.zsh"
wezterm_shell_integration_file = "{{ xdg_data_home }}/wezterm/wezterm.sh"

[tasks."update"]
description = "Update all tools and global CLIs"
run = [
  { tasks = [
    "update:brew",
  ] },
  { tasks = [
    "update:submodules",
    "update:package_managers",
  ] },
  { tasks = [
    "update:antidote",
    "update:wezterm_shell_integration",
    "update:nvim",
    "update:gh",
    "update:for_env",
  ] },
  "echo Updates completed at $(date)",
]

[tasks."update:brew"]
description = "Update Homebrew and all installed formulae/casks"
run = ["brew update", "brew upgrade"]

[tasks."update:antidote"]
description = "Update antidote and bundles"
run = """
#!/usr/bin/env zsh
if [ ! -d "{{ vars.antidote_home }}/.git" ]; then
  git clone --depth=1 https://github.com/mattmc3/antidote.git "{{ vars.antidote_home }}"
fi

source "{{ vars.antidote_home }}/antidote.zsh"
mkdir -p "$(dirname "{{ vars.zsh_plugin_static_file }}")"
antidote update --self --bundles
antidote bundle <"{{ vars.zsh_plugin_list_file }}" >|"{{ vars.zsh_plugin_static_file }}"
"""

[tasks."update:wezterm_shell_integration"]
description = "Refresh the cached WezTerm shell integration script when upstream changes"
run = """
dest="{{ vars.wezterm_shell_integration_file }}"
mkdir -p "$(dirname "$dest")"

if ! command -v curl >/dev/null 2>&1; then
  echo "curl not found; skipping WezTerm shell integration refresh."
  exit 0
fi

tmp="${dest}.tmp"
url="https://raw.githubusercontent.com/wezterm/wezterm/main/assets/shell-integration/wezterm.sh"

if [ -f "$dest" ]; then
  if curl -fsSL -z "$dest" -o "$tmp" "$url"; then
    if [ -s "$tmp" ]; then
      mv "$tmp" "$dest"
      echo "Updated WezTerm shell integration."
    else
      rm -f "$tmp"
      echo "WezTerm shell integration already current."
    fi
  else
    rm -f "$tmp"
    echo "Failed to refresh WezTerm shell integration; continuing."
  fi
else
  if curl -fsSL -o "$tmp" "$url"; then
    mv "$tmp" "$dest"
    echo "Downloaded WezTerm shell integration."
  else
    rm -f "$tmp"
    echo "Failed to download WezTerm shell integration; continuing."
  fi
fi
"""

[tasks."update:bat_cache"]
description = "update bat cache"
sources = ["{{ xdg_config_home }}/bat/**"]
outputs = { auto = true }
run = "bat cache --build"

[tasks."update:submodules"]
description = "Update git submodules in dotfiles repo"
run = ["git -C $DOTFILES_ROOT submodule update --remote"]

[tasks."update:package_managers"]
description = "Update package managers (pip, npm, etc.)"
run = ["npm i -g npm"]

[tasks."nvim:python:ensure"]
description = "Ensure the Neovim Python virtual environment exists"
run = '''
if [ ! -d "${nvim_virtualenv}" ]; then
  uv venv --python python "${nvim_virtualenv}"
fi
uv pip install --upgrade -p "${nvim_virtualenv}/bin/python" pynvim
'''

[tasks."nvim:python:rebuild"]
description = "Rebuild the Neovim Python virtual environment against active mise python"
run = '''
uv venv --clear --python python "${nvim_virtualenv}"
uv pip install -p "${nvim_virtualenv}/bin/python" pynvim
'''

[tasks."update:nvim"]
description = "Update Neovim and plugins"
depends = ["update:package_managers", "nvim:python:ensure"]
run = [
  "nvim --headless \"+Lazy! sync\" +qa",
  "nvim --headless -c 'autocmd User MasonUpdateAllComplete quitall' -c 'MasonUpdateAll'",
]

[tasks."update:gh"]
description = "Update gh extensions if gh installed and auth'd"
run = """
if gh auth status >/dev/null 2>&1; then
  echo "Updating gh extensions..."
  gh extension upgrade --all
else
  echo "gh not authenticated, skipping extension update."
fi
"""
