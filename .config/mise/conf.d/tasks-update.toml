[tasks."update"]
description = "Update all tools and global CLIs"
run = [
  { tasks = [
    "update:brew",
  ] },
  { tasks = [
    "update:submodules",
    "update:package_managers",
  ] },
  { tasks = [
    "update:zinit",
    "update:nvim",
    "update:gh",
    "update:for_env",
  ] },
  "echo Updates completed at $(date)",
]

[tasks."update:brew"]
description = "Update Homebrew and all installed formulae/casks"
run = ["brew update", "brew upgrade"]

[tasks."update:zinit"]
description = "Update zinit and plugins"
run = '''
#!/usr/bin/env zsh
# Source zinit explicitly so the function exists in this non-interactive shell
ZINIT_HOME="${ZINIT_HOME:-$HOME/.local/share/zinit}"
source "$ZINIT_HOME/zinit.git/zinit.zsh"

zinit self-update
zinit update --parallel --all
'''

[tasks."update:bat_cache"]
description = "update bat cache"
sources = ["{{ xdg_config_home }}/bat/**"]
outputs = { auto = true }
run = "bat cache --build"

[tasks."update:submodules"]
description = "Update git submodules in dotfiles repo"
run = ["git -C $HOME/.dotfiles submodule update --remote"]

[tasks."update:package_managers"]
description = "Update package managers (pip, npm, etc.)"
run = ["npm i -g npm"]

[tasks."create_nvim_venv"]
description = "create a virtualenvironment for nvim if it doesn't exist"
run = "[ -d ${nvim_virtualenv} ] || uv venv ${nvim_virtualenv}"

[tasks."install_nvim_python_deps"]
description = "install nvim dependencies"
depends = ["create_nvim_venv"]
run = "uv pip install -p ${nvim_virtualenv}/bin/python pynvim"

[tasks."update:nvim"]
description = "Update Neovim and plugins"
depends = ["update:package_managers", "install_nvim_python_deps"]
run = [
  "nvim --headless \"+Lazy! sync\" +qa",
  "nvim --headless -c 'autocmd User MasonUpdateAllComplete quitall' -c 'MasonUpdateAll'",
]

[tasks."update:gh"]
description = "Update gh extensions if gh installed and auth'd"
run = """
if gh auth status >/dev/null 2>&1; then
  echo "Updating gh extensions..."
  gh extension upgrade --all
else
  echo "gh not authenticated, skipping extension update."
fi
"""
