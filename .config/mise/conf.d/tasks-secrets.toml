[tasks."secrets:render"]
description = "Render secret-backed config files from 1Password templates"
run = [{ tasks = ["secrets:render:todoist_cli"] }]

[tasks."secrets:clean"]
description = "Remove rendered secret-backed config files"
run = [{ tasks = ["secrets:clean:todoist_cli"] }]

[tasks."secrets:render:todoist_cli"]
description = "Render Todoist CLI config from 1Password template"
vars = { config_json = "{{ xdg_config_home }}/todoist/config.json", config_template = "{{ config_root }}/.config/todoist/config.json.op_tmpl" }
sources = ["{{ vars.config_template }}"]
outputs = ["{{ vars.config_json }}"]
run = """
"$OP_COMMAND" inject -i "{{ vars.config_template }}" \
  -o "{{ vars.config_json }}"
chmod 0600 "{{ vars.config_json }}"
"""

[tasks."secrets:clean:todoist_cli"]
description = "Remove rendered Todoist CLI config"
vars = { config_json = "{{ xdg_config_home }}/todoist/config.json" }
run = 'rm -f "{{ vars.config_json }}"'
